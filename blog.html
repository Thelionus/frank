  <style>
    /* ── Variables ── */
    :root {
      --bg:       #0c0b09;
      --bg2:      #111009;
      --text:     #e8e2d8;
      --muted:    #857f73;
      --faint:    #252320;
      --gold:     #c9a96e;
      --gold-dim: #7a6440;
      --white:    #f5f0e8;
      --maxw:     960px;
      --serif:    'Playfair Display', Georgia, serif;
      --sans:     'Inter', -apple-system, sans-serif;
    }

    /* ── Reset ── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Layout wrapper ── */
    .wrap {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 0 44px;
    }
    @media (max-width: 600px) { .wrap { padding: 0 22px; } }

    /* ── Scroll reveal ── */
    .rev {
      opacity: 0;
      transform: translateY(26px);
      transition: opacity .65s ease, transform .65s ease;
    }
    .rev.on { opacity: 1; transform: translateY(0); }
    .rev-d1 { transition-delay: .1s; }
    .rev-d2 { transition-delay: .2s; }

    /* ══════════════════════════════
       NAVIGATION
    ══════════════════════════════ */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: 68px;
      padding: 0 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(12,11,9,.92) 0%, transparent 100%);
      transition: background .35s, border-color .35s;
      border-bottom: 1px solid transparent;
    }
    #nav.solid {
      background: rgba(12,11,9,.97);
      border-bottom-color: var(--faint);
    }
    .nav-logo {
      font-family: var(--serif);
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--white);
      letter-spacing: .01em;
    }
    .nav-links {
      display: flex;
      gap: 32px;
    }
    .nav-links a {
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-links a.active { color: var(--gold); }
    .nav-social {
      display: flex;
      gap: 22px;
    }
    .nav-social a {
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color .2s;
    }
    .nav-social a:hover { color: var(--gold); }
    @media (max-width: 820px) {
      #nav { padding: 0 22px; }
      .nav-links { display: none; }
    }
    @media (max-width: 540px) {
      .nav-social { display: none; }
    }

    /* ══════════════════════════════
       PAGE HEADER
    ══════════════════════════════ */
    .page-header {
      padding: 140px 0 64px;
      border-bottom: 1px solid var(--faint);
    }
    .s-label {
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
    }
    .page-header h1 {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 400;
      font-style: italic;
      line-height: 1.08;
      color: var(--white);
      margin-bottom: 20px;
    }
    .page-desc {
      font-size: .95rem;
      color: var(--muted);
      max-width: 520px;
      line-height: 1.7;
    }
    .gold-rule {
      width: 48px;
      height: 2px;
      background: var(--gold);
      margin: 28px 0 0;
    }

    /* ══════════════════════════════
       BLOG POSTS
    ══════════════════════════════ */
    #blog-posts {
      padding: 0 0 100px;
    }

    .blog-post {
      padding: 52px 0;
      border-bottom: 1px solid var(--faint);
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 0 52px;
      opacity: 0;
      transform: translateY(22px);
      transition: opacity .6s ease, transform .6s ease;
    }
    .blog-post.on {
      opacity: 1;
      transform: translateY(0);
    }

    .blog-meta {
      padding-top: 6px;
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold-dim);
      line-height: 1.4;
    }

    .blog-body h2 {
      font-family: var(--serif);
      font-size: clamp(1.2rem, 2.4vw, 1.6rem);
      font-weight: 400;
      font-style: italic;
      color: var(--white);
      line-height: 1.25;
      margin-bottom: 16px;
      cursor: default;
    }

    .blog-summary p,
    .blog-content p {
      font-size: .95rem;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 16px;
    }
    .blog-content p:last-child { margin-bottom: 0; }

    .blog-content { margin-top: 4px; }

    .read-more {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 20px;
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--gold);
      border-bottom: 1px solid var(--gold-dim);
      padding-bottom: 2px;
      transition: color .2s, border-color .2s;
    }
    .read-more:hover {
      color: var(--white);
      border-color: var(--white);
    }
    .read-more::after {
      content: '\2192';
      font-style: normal;
      transition: transform .2s;
    }
    .read-more:hover::after { transform: translateX(3px); }

    @media (max-width: 700px) {
      .blog-post {
        grid-template-columns: 1fr;
        gap: 10px 0;
      }
      .blog-meta { padding-top: 0; }
    }

    /* ══════════════════════════════
       FOOTER
    ══════════════════════════════ */
    footer {
      border-top: 1px solid var(--faint);
      padding: 52px 0;
    }
    .foot-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .foot-links { display: flex; gap: 28px; }
    .foot-links a {
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color .2s;
    }
    .foot-links a:hover { color: var(--gold); }
    .foot-copy { font-size: .75rem; color: #33302a; }
    @media (max-width: 540px) {
      .foot-inner { flex-direction: column; gap: 22px; align-items: flex-start; }
    }
  </style>

<body>

  <!-- ─── PAGE HEADER ─── -->
  <header class="page-header">
    <div class="wrap">
      <p class="s-label rev">Writings</p>
      <h1 class="rev rev-d1">Blog</h1>
      <p class="page-desc rev rev-d1">Thoughts on cognitive engineering, usability, innovation &amp; technology.</p>
      <div class="gold-rule rev rev-d2"></div>
    </div>
  </header>

  <!-- ─── BLOG POSTS ─── -->

    <div class="wrap">

        <!-- Posts are dynamically loaded by blog.js -->

  </main>

    <div class="wrap">
      <div class="foot-inner">
        <div class="foot-links">
          <a href="https://twitter.com/@FrancoisAubin2" target="_blank" rel="noopener noreferrer">Twitter</a>
          <a href="https://facebook.com/francois.aubin.50" target="_blank" rel="noopener noreferrer">Facebook</a>
          <a href="https://instagram.com/francois.aubin" target="_blank" rel="noopener noreferrer">Instagram</a>
        </div>

  <script src="blog.js"></script>
  <script>
    /* Sticky nav */
    const nav = document.getElementById('nav');
    const onScroll = () => nav.classList.toggle('solid', window.scrollY > 50);
    window.addEventListener('scroll', onScroll, { passive: true });

    /* Scroll reveal for static header elements */
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('on'); io.unobserve(e.target); }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -28px 0px' });
    document.querySelectorAll('.rev').forEach(el => io.observe(el));

    /* Scroll reveal + grid layout for dynamically created blog posts */
    const blogIo = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('on'); blogIo.unobserve(e.target); }
      });
    }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });

    function enhancePosts() {
      document.querySelectorAll('.blog-post').forEach((post, i) => {
        const meta = post.querySelector('.blog-meta');
        if (meta && !post.querySelector('.blog-body')) {
          const body = document.createElement('div');
          body.className = 'blog-body';
          Array.from(post.children).forEach(child => {
            if (!child.classList.contains('blog-meta')) body.appendChild(child);
          });
          post.appendChild(body);
        }
        post.style.transitionDelay = (i % 8) * 0.06 + 's';
        blogIo.observe(post);
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', enhancePosts);
    } else {
      enhancePosts();
    }
  </script>
